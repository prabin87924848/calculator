<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Pro Calculator</title>
    
    <style>
        /* CSS: The Styling */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #222; /* Dark background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .calculator {
            background-color: #000;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0px 20px 50px rgba(0,0,0,0.5);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 70px;
            font-size: 40px;
            text-align: right;
            margin-bottom: 20px;
            padding: 10px;
            box-sizing: border-box;
            border: none;
            background: transparent;
            color: white;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 65px;
            width: 65px;
            font-size: 24px;
            border: none;
            border-radius: 50%; /* Makes buttons circular like iPhone */
            cursor: pointer;
            background-color: #333;
            color: white;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #444;
        }

        /* Styling for math operators */
        .operator {
            background-color: #ff9500;
            color: white;
        }

        .operator:hover {
            background-color: #ffb043;
        }

        /* Styling for the AC and specialized buttons */
        .special {
            background-color: #a5a5a5;
            color: black;
        }

        .special:hover {
            background-color: #d2d2d2;
        }

        /* Styling for the zero button to make it wider */
        .btn-zero {
            grid-column: span 2;
            width: 142px;
            border-radius: 35px;
            text-align: left;
            padding-left: 25px;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" placeholder="0" readonly>
        
        <div class="buttons">
            <button class="special" onclick="clearScreen()">AC</button>
            <button class="special" onclick="add('%')">%</button>
            <button class="special" onclick="deleteLast()">DEL</button>
            <button class="operator" onclick="add('/')">÷</button>
            
            <button onclick="add('7')">7</button>
            <button onclick="add('8')">8</button>
            <button onclick="add('9')">9</button>
            <button class="operator" onclick="add('*')">×</button>
            
            <button onclick="add('4')">4</button>
            <button onclick="add('5')">5</button>
            <button onclick="add('6')">6</button>
            <button class="operator" onclick="add('-')">−</button>
            
            <button onclick="add('1')">1</button>
            <button onclick="add('2')">2</button>
            <button onclick="add('3')">3</button>
            <button class="operator" onclick="add('+')">+</button>
            
            <button class="btn-zero" onclick="add('0')">0</button>
            <button onclick="add('.')">.</button>
            <button class="operator" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        // JS: The Logic
        const screen = document.getElementById('display');

        function add(value) {
            // Prevent adding multiple operators in a row
            screen.value += value;
        }

        function clearScreen() {
            screen.value = "";
        }

        function deleteLast() {
            screen.value = screen.value.slice(0, -1);
        }

        function calculate() {
            try {
                // Perform math logic
                screen.value = eval(screen.value);
            } catch (err) {
                screen.value = "Error";
                setTimeout(clearScreen, 1500); // Clear error after 1.5 seconds
            }
        }
    </script>

</body>
</html>
